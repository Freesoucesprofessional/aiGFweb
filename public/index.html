<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Muskan 💕 - Your AI Girlfriend</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --pink:#f4699a;
  --pink2:#e8437f;
  --bg:#fdf0f5;
  --white:#ffffff;
  --text:#3a2030;
  --muted:#b08fa0;
  --border:#f5cfe0;
}

html,body{
  height:100%;
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  overflow:hidden;
}

#app{
  display:flex;
  flex-direction:column;
  height:100dvh;
  max-width:480px;
  margin:0 auto;
  background:var(--white);
  box-shadow:0 0 40px rgba(244,105,154,.15);
  position:relative;
}

header{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  background:var(--white);
  border-bottom:1.5px solid var(--border);
  flex-shrink:0;
  z-index:10;
}
.av{
  width:44px;height:44px;
  border-radius:50%;
  background:linear-gradient(135deg,#fbb,var(--pink));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  flex-shrink:0;
  box-shadow:0 0 0 3px #fde;
}
header h1{font-family:'Pacifico',cursive;font-size:1.1rem;color:var(--pink);line-height:1}
.online{font-size:.72rem;color:#5bd45b;margin-top:2px}

#msgs{
  flex:1;
  overflow-y:auto;
  padding:16px 14px 8px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:var(--bg);
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.row{
  display:flex;
  align-items:flex-end;
  gap:7px;
  animation:popin .22s cubic-bezier(.34,1.56,.64,1);
  width:100%;
}
@keyframes popin{
  from{opacity:0;transform:translateY(10px) scale(.92)}
  to{opacity:1;transform:none}
}
.row.me{
  justify-content:flex-end;
}
.row.her{
  justify-content:flex-start;
}

.mini{
  width:28px;
  height:28px;
  border-radius:50%;
  background:linear-gradient(135deg,#fbb,var(--pink));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  flex-shrink:0;
  margin-bottom:4px;
}

.message-wrapper{
  display:flex;
  flex-direction:column;
  max-width:72%;
}

.bub{
  padding:10px 14px;
  border-radius:18px;
  font-size:.9rem;
  line-height:1.5;
  word-break:break-word;
  white-space:pre-wrap;
  display:inline-block;
}
.row.me .bub{
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  border-bottom-right-radius:4px;
  box-shadow:0 3px 10px rgba(244,105,154,.3);
}
.row.her .bub{
  background:var(--white);
  color:var(--text);
  border-bottom-left-radius:4px;
  border:1.5px solid var(--border);
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.ts{
  font-size:.62rem;
  color:var(--muted);
  margin-top:3px;
  display:block;
}
.row.me .ts{
  text-align:right;
}
.row.her .ts{
  text-align:left;
}

.dots{
  display:flex;
  gap:4px;
  padding:4px 0;
}
.dots span{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--pink);
  animation:dot .9s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{
  0%,80%,100%{transform:translateY(0);opacity:.4}
  40%{transform:translateY(-6px);opacity:1}
}

#bar{
  display:flex;
  align-items:flex-end;
  gap:10px;
  padding:10px 14px;
  padding-bottom:max(10px, env(safe-area-inset-bottom));
  background:var(--white);
  border-top:1.5px solid var(--border);
  flex-shrink:0;
}
#inp{
  flex:1;
  border:2px solid var(--border);
  border-radius:22px;
  padding:10px 16px;
  font-family:'Nunito',sans-serif;
  font-size:.9rem;
  color:var(--text);
  background:var(--bg);
  outline:none;
  resize:none;
  max-height:100px;
  line-height:1.4;
  transition:border-color .2s;
}
#inp:focus{border-color:var(--pink)}
#inp::placeholder{color:var(--muted)}
#btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  box-shadow:0 3px 10px rgba(244,105,154,.4);
  transition:transform .15s;
}
#btn:hover{transform:scale(1.08)}
#btn:active{transform:scale(.94)}
#btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="av">💕</div>
    <div>
      <h1>Muskan</h1>
      <div class="online">● Online</div>
    </div>
  </header>

  <div id="msgs"></div>

  <div id="bar">
    <textarea id="inp" rows="1" placeholder="Kuch bhi bol…" maxlength="500"></textarea>
    <button id="btn">➤</button>
  </div>

</div>

<script>
const msgs = document.getElementById('msgs');
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');

function ts() { 
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
}

function scroll() { 
  msgs.scrollTop = msgs.scrollHeight 
}

function addMsg(text, who) {
  const row = document.createElement('div');
  row.className = `row ${who}`;

  if (who === 'her') {
    const av = document.createElement('div');
    av.className = 'mini';
    av.textContent = '💕';
    row.appendChild(av);
  }

  const messageWrapper = document.createElement('div');
  messageWrapper.className = 'message-wrapper';
  
  const bub = document.createElement('div');
  bub.className = 'bub';
  bub.textContent = text;
  
  const t = document.createElement('span');
  t.className = 'ts';
  t.textContent = ts();
  
  messageWrapper.appendChild(bub);
  messageWrapper.appendChild(t);
  row.appendChild(messageWrapper);
  
  msgs.appendChild(row);
  scroll();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row her';
  row.id = 'typing';
  
  const av = document.createElement('div');
  av.className = 'mini';
  av.textContent = '💕';
  
  const messageWrapper = document.createElement('div');
  messageWrapper.className = 'message-wrapper';
  
  const bub = document.createElement('div');
  bub.className = 'bub';
  bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  
  messageWrapper.appendChild(bub);
  row.appendChild(av);
  row.appendChild(messageWrapper);
  msgs.appendChild(row);
  scroll();
}

function hideTyping() {
  const typing = document.getElementById('typing');
  if (typing) typing.remove();
}

async function send() {
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  btn.disabled = true;
  
  addMsg(text, 'me');
  showTyping();

  try {
    const response = await fetch(`/api/chat?prompt=${encodeURIComponent(text)}`);
    const data = await response.json();
    
    hideTyping();
    
    if (data.success && data.message) {
      addMsg(data.message, 'her');
    } else {
      addMsg("Kuch gadbad hui, phir se bolo na 🥺", 'her');
    }
    
  } catch (error) {
    hideTyping();
    console.error('Error:', error);
    addMsg("Network error - thodi der baad try karo 💕", 'her');
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

// Auto-grow textarea
inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
});

inp.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

btn.addEventListener('click', send);

// Welcome message
setTimeout(() => {
  addMsg('Heyy baby! 🥰 Kuch bhi bol, main sun rahi hoon!', 'her');
}, 100);
</script>
</body>
</html>
